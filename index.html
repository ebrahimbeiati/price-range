<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css"/>
    <title>Price range</title>
</head>
<body>
    <div class="main">
        <div class="headline">
            <p>Price range app</p>
        </div>
        <div class="custom-wrapper">
            <div class="header">
                <h2 class="title">Price Range </h2>
            </div>
            <div class="input-container">
                <div class="price-input">
                    <div class="price-field">
                        <span>Minimum Price</span>
                        <input type="number" class="min-input" value="2600">
                    </div>
                    <div class="price-field">
                        <span>Maximum Price</span>
                        <input type="number" class="max-input" value="9600">
                    </div>
                </div>
                <div class="slider">
                    <div class="price-slider"></div>
                </div>
            </div>
            <div class="range-input"> 
                <input type="range" class="min-range" min="0" max="10000" value="2600" step="1">
                <input type="range" class="max-range" min="0" max="10000" value="8600" step="1">
            </div>
        </div>

    </div>
    <script src="./script.js"></script>
</body>
</html>
